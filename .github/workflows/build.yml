name: Build HungerBar

on:
  push:
    branches: [main, arena/019f5dd9-lethalcompany]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build HungerBar/HungerBar.csproj -c Release
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: HungerBar
          path: HungerBar/bin/Release/HungerBar.dll
